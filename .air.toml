root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/server"
  # Добавляем -gcflags: отключаем оптимизации и инлайнинг — без этого
  # точки остановки "прыгают" или вообще не срабатывают
  cmd = "go build -gcflags='all=-N -l' -o ./tmp/server ./cmd/server"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "migrations", "docker", "docs", "config/jwt"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  # full_bin заменяет простой запуск бинарника на запуск через dlv:
  # --headless       — dlv не открывает свой UI, ждёт подключения IDE
  # --listen=:2345   — порт, на который подключается GoLand
  # --api-version=2  — GoLand требует именно v2
  # --accept-multiclient — можно переподключаться после каждого rebuild
  # --continue       — сервер стартует сразу, не ждёт первого attach
  full_bin = "dlv exec --headless --listen=:2345 --api-version=2 --accept-multiclient --continue ./tmp/server"
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
